<div class="min-h-screen flex items-center justify-center bg-slate-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <div class="text-center mb-6">
      <div class="mx-auto w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mb-3">
        <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Verify it's you</h2>
      <p class="text-sm text-slate-500 mt-1">
        We sent a 6-digit code to
        <span class="font-semibold text-slate-700">{{ emailHint || 'your email' }}</span>.
      </p>
    </div>

    <div *ngIf="errorMessage"
         class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
      {{ errorMessage }}
      <span *ngIf="attemptsRemaining !== null" class="block mt-1 text-xs text-red-600">
        {{ attemptsRemaining }} attempt{{ attemptsRemaining === 1 ? '' : 's' }} remaining.
      </span>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Verification code</label>
        <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6"
               [ngModel]="code" (ngModelChange)="onCodeInput($event)"
               (keydown.enter)="verify()"
               class="w-full px-4 py-3 border border-slate-300 rounded-lg text-center text-2xl font-mono tracking-[0.5em] focus:ring-2 focus:ring-blue-500 focus:outline-none"
               placeholder="000000">
      </div>

      <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer select-none">
        <input type="checkbox" [(ngModel)]="rememberDevice"
               class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
        Trust this device for 30 days
      </label>

      <button type="button" (click)="verify()"
              [disabled]="code.length !== 6 || isVerifying"
              [class.opacity-50]="code.length !== 6 || isVerifying"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition-colors disabled:cursor-not-allowed">
        {{ isVerifying ? 'Verifying…' : 'Verify' }}
      </button>

      <div class="flex justify-between items-center text-sm pt-2">
        <button type="button" (click)="cancel()"
                class="text-slate-500 hover:text-slate-700">
          ← Back to login
        </button>
        <button type="button" (click)="resend()"
                [disabled]="isResending || resendCooldown > 0"
                class="text-blue-600 hover:underline disabled:text-slate-400 disabled:no-underline disabled:cursor-not-allowed">
          <ng-container *ngIf="resendCooldown > 0; else resendLabel">
            Resend in {{ resendCooldown }}s
          </ng-container>
          <ng-template #resendLabel>
            {{ isResending ? 'Sending…' : 'Resend code' }}
          </ng-template>
        </button>
      </div>
    </div>
  </div>
</div>
